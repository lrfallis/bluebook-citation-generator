<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluebook Citation Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  header p { font-size: 14px; color: #666; }
  .pill {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    background: #e8f5e9;
    color: #2e7d32;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
    font-weight: 500;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e4e0;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 13px; font-weight: 500; color: #555;
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #534AB7; }
  label { font-size: 12px; color: #777; display: block; margin-bottom: 5px; }
  input[type="text"] {
    width: 100%; font-size: 14px; padding: 9px 12px;
    border: 1px solid #ddd; border-radius: 8px;
    background: #fff; color: #1a1a18; outline: none;
    font-family: inherit; transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.1); }
  input::placeholder { color: #bbb; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .chip {
    font-size: 12px; padding: 5px 12px;
    border: 1px solid #ddd; border-radius: 20px;
    background: transparent; color: #666; cursor: pointer;
    transition: all 0.12s; font-family: inherit;
  }
  .chip:hover { background: #f5f4f0; }
  .chip.active { border-color: #534AB7; color: #534AB7; background: #EEEDFE; font-weight: 500; }
  .url-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .url-row input { flex: 1; }
  .go-btn {
    width: 100%; padding: 11px; border: none; border-radius: 8px;
    background: #534AB7; color: #fff; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.15s; font-family: inherit;
  }
  .go-btn:hover:not(:disabled) { background: #3C3489; }
  .go-btn:disabled { background: #ccc; cursor: not-allowed; }
  .status { font-size: 13px; color: #888; margin-top: 8px; min-height: 20px; }
  .result-card {
    background: #fff; border: 1px solid #e5e4e0;
    border-radius: 12px; overflow: hidden; margin-bottom: 1rem;
  }
  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 1.25rem; background: #f9f8f5;
    border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 6px;
  }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #EEEDFE; color: #3C3489; font-weight: 500; }
  .meta { display: flex; gap: 10px; align-items: center; }
  .rule-tag { font-size: 11px; color: #999; }
  .copy-btn {
    font-size: 12px; padding: 4px 12px;
    border: 1px solid #ddd; border-radius: 6px;
    background: #fff; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .copy-btn:hover { background: #f5f4f0; }
  .citation-text {
    padding: 1.25rem; font-size: 14px; line-height: 1.9;
    font-family: Georgia, 'Times New Roman', serif;
    border-bottom: 1px solid #eee; color: #1a1a18;
  }
  .note-box { padding: 10px 1.25rem; background: #FAEEDA; font-size: 12px; color: #633806; line-height: 1.6; border-top: 1px solid #FAC775; }
  .breakdown { padding: 1rem 1.25rem; }
  .breakdown-label { font-size: 11px; color: #999; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .field { display: flex; gap: 10px; margin-bottom: 5px; }
  .field-k { font-size: 12px; color: #888; min-width: 90px; padding-top: 1px; }
  .field-v { font-size: 13px; color: #1a1a18; flex: 1; line-height: 1.5; word-break: break-word; }
  .error {
    background: #FCEBEB; border: 1px solid #F7C1C1;
    border-radius: 8px; padding: 12px 1rem;
    font-size: 13px; color: #A32D2D; margin-bottom: 1rem; line-height: 1.6;
  }
  .history-section { margin-top: 1.5rem; }
  .history-divider { height: 1px; background: #eee; margin-bottom: 1rem; }
  .history-label { font-size: 12px; color: #999; margin-bottom: 8px; }
  .history-item {
    background: #f9f8f5; border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px; cursor: pointer; transition: background 0.1s;
    border: 1px solid transparent;
  }
  .history-item:hover { background: #fff; border-color: #e5e4e0; }
  .history-cite { font-size: 13px; font-family: Georgia, serif; line-height: 1.6; }
  .history-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { text-align: center; font-size: 12px; color: #bbb; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bluebook Citation Generator <span class="pill">Local App</span></h1>
    <p>Paste any URL to get a properly formatted Bluebook 21st edition citation.</p>
  </header>

  <div class="card">
    <div class="card-title"><span class="dot"></span> Generate Citation</div>
    <label>Source type</label>
    <div class="chips" id="chips">
      <button class="chip active" data-t="auto">Auto-detect</button>
      <button class="chip" data-t="internet">Website</button>
      <button class="chip" data-t="news">News article</button>
      <button class="chip" data-t="journal">Law review / Journal</button>
      <button class="chip" data-t="case">Court case</button>
      <button class="chip" data-t="statute">Statute / Regulation</button>
      <button class="chip" data-t="book">Book / Treatise</button>
      <button class="chip" data-t="government">Government document</button>
    </div>
    <label for="urlInput">URL to cite</label>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="https://..." />
    </div>
    <button class="go-btn" id="genBtn" onclick="generate()">Generate citation</button>
    <div class="status" id="status"></div>
  </div>

  <div id="errorBox" style="display:none;" class="error"></div>
  <div id="resultArea" style="display:none;"></div>

  <div class="history-section" id="historySec" style="display:none;">
    <div class="history-divider"></div>
    <div class="history-label">Previous citations this session</div>
    <div id="historyList"></div>
  </div>

  <footer>Bluebook 21st Edition &nbsp;·&nbsp; API key secured server-side</footer>
</div>

<script>
let selectedType = 'auto';
let citations = [];

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    selectedType = c.dataset.t;
  });
});
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

async function generate() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url || !url.startsWith('http')) { showError('Please enter a valid URL starting with https://'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  setStatus('Contacting server…');

  try {
    const res = await fetch('/api/cite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, sourceType: selectedType })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`);
    setStatus('');
    renderResult(data);
    addHistory(data, url);
  } catch (err) {
    setStatus('');
    showError('Error: ' + (err.message || 'Something went wrong.'));
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Generate citation';
  }
}

function renderResult(d) {
  const conf = d.confidence || 'medium';
  const confColor = conf === 'high' ? '#3B6D11' : conf === 'low' ? '#993C1D' : '#854F0B';
  let fields = '';
  if (d.fields) Object.entries(d.fields).forEach(([k, v]) => {
    if (v && String(v).trim() && v !== 'N/A')
      fields += `<div class="field"><span class="field-k">${esc(k.charAt(0).toUpperCase()+k.slice(1))}</span><span class="field-v">${esc(String(v))}</span></div>`;
  });
  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="badge">${esc(d.type||'Citation')}</span>
        <div class="meta">
          <span style="font-size:11px;color:${confColor};">${conf} confidence</span>
          <span class="rule-tag">${esc(d.rule||'')}</span>
          <button class="copy-btn" onclick="copyCite(this)">Copy</button>
        </div>
      </div>
      <div class="citation-text" id="citeOut">${esc(d.citation||'')}</div>
      ${d.notes ? `<div class="note-box">Note: ${esc(d.notes)}</div>` : ''}
      ${fields ? `<div class="breakdown"><div class="breakdown-label">Components</div>${fields}</div>` : ''}
    </div>`;
  document.getElementById('resultArea').style.display = 'block';
}

function copyCite(btn) {
  navigator.clipboard.writeText(document.getElementById('citeOut').innerText).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1600);
  });
}

function addHistory(d, url) {
  citations.unshift({ cite: d.citation, type: d.type, url, t: new Date() });
  if (citations.length > 10) citations.pop();
  const sec = document.getElementById('historySec');
  if (citations.length < 2) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('historyList').innerHTML = citations.slice(1).map(h =>
    `<div class="history-item" onclick="document.getElementById('urlInput').value='${h.url.replace(/'/g,"\\'")}'; window.scrollTo(0,0);">
      <div class="history-cite">${esc(h.cite)}</div>
      <div class="history-meta">${esc(h.type||'')} &middot; ${h.t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
    </div>`
  ).join('');
}

function setStatus(m) { document.getElementById('status').textContent = m; }
function showError(m) { const b = document.getElementById('errorBox'); b.textContent = m; b.style.display = 'block'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
