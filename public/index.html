<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluebook Citation Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 760px; margin: 0 auto; }
header { margin-bottom: 2rem; }
header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
header p { font-size: 14px; color: #666; }
.card { background: #fff; border: 1px solid #e5e4e0; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
.card-title { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #534AB7; }
label { font-size: 12px; color: #777; display: block; margin-bottom: 5px; }
input[type="text"] { width: 100%; font-size: 14px; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a18; outline: none; font-family: inherit; transition: border-color 0.15s; }
input[type="text"]:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.1); }
input::placeholder { color: #bbb; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.chip { font-size: 12px; padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; background: transparent; color: #666; cursor: pointer; transition: all 0.12s; font-family: inherit; }
.chip:hover { background: #f5f4f0; }
.chip.active { border-color: #534AB7; color: #534AB7; background: #EEEDFE; font-weight: 500; }
.format-tabs { display: flex; gap: 0; margin-bottom: 1.25rem; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
.format-tab { flex: 1; padding: 8px; font-size: 13px; background: transparent; border: none; cursor: pointer; font-family: inherit; color: #666; transition: all 0.12s; text-align: center; }
.format-tab:not(:last-child) { border-right: 1px solid #ddd; }
.format-tab.active { background: #534AB7; color: #fff; font-weight: 500; }
.format-tab:hover:not(.active) { background: #f5f4f0; }
.url-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.url-row input { flex: 1; }
.go-btn { width: 100%; padding: 11px; border: none; border-radius: 8px; background: #534AB7; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; font-family: inherit; }
.go-btn:hover:not(:disabled) { background: #3C3489; }
.go-btn:disabled { background: #ccc; cursor: not-allowed; }
.status { font-size: 13px; color: #888; margin-top: 8px; min-height: 20px; }
.result-card { background: #fff; border: 1px solid #e5e4e0; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
.result-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 1.25rem; background: #f9f8f5; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 6px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #EEEDFE; color: #3C3489; font-weight: 500; }
.format-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; font-weight: 500; }
.meta { display: flex; gap: 8px; align-items: center; }
.rule-tag { font-size: 11px; color: #999; }
.copy-btn { font-size: 12px; padding: 4px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.copy-btn:hover { background: #f5f4f0; }
.citation-text { padding: 1.25rem; font-size: 14px; line-height: 1.9; font-family: Georgia, 'Times New Roman', serif; border-bottom: 1px solid #eee; color: #1a1a18; }
.variants { padding: 1rem 1.25rem; border-bottom: 1px solid #eee; }
.variants-title { font-size: 11px; color: #999; margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
.variant { margin-bottom: 10px; }
.variant-label { font-size: 11px; color: #534AB7; font-weight: 500; margin-bottom: 3px; }
.variant-text { font-size: 13px; font-family: Georgia, serif; color: #1a1a18; line-height: 1.7; background: #f9f8f5; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
.variant-text:hover { background: #EEEDFE; }
.note-box { padding: 10px 1.25rem; background: #FAEEDA; font-size: 12px; color: #633806; line-height: 1.6; border-top: 1px solid #FAC775; }
.breakdown { padding: 1rem 1.25rem; }
.breakdown-label { font-size: 11px; color: #999; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
.field { display: flex; gap: 10px; margin-bottom: 5px; }
.field-k { font-size: 12px; color: #888; min-width: 90px; padding-top: 1px; }
.field-v { font-size: 13px; color: #1a1a18; flex: 1; line-height: 1.5; word-break: break-word; }
.error { background: #FCEBEB; border: 1px solid #F7C1C1; border-radius: 8px; padding: 12px 1rem; font-size: 13px; color: #A32D2D; margin-bottom: 1rem; line-height: 1.6; }
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
footer { text-align: center; font-size: 12px; color: #bbb; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
.tip { font-size: 12px; color: #999; margin-top: 6px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Bluebook Citation Generator</h1>
    <p>Paste any URL to get a properly formatted Bluebook 21st edition citation.</p>
  </header>

  <div class="card">
    <div class="card-title"><span class="dot"></span> Citation Format</div>
    <div class="format-tabs" id="formatTabs">
      <button class="format-tab active" data-f="general">General</button>
      <button class="format-tab" data-f="brief">Court Brief</button>
      <button class="format-tab" data-f="journal">Law Review</button>
    </div>

    <div class="card-title"><span class="dot"></span> Source Type</div>
    <div class="chips" id="chips">
      <button class="chip active" data-t="auto">Auto-detect</button>
      <button class="chip" data-t="internet">Website</button>
      <button class="chip" data-t="news">News article</button>
      <button class="chip" data-t="journal">Law review / Journal</button>
      <button class="chip" data-t="case">Court case</button>
      <button class="chip" data-t="statute">Statute / Regulation</button>
      <button class="chip" data-t="book">Book / Treatise</button>
      <button class="chip" data-t="government">Government document</button>
      <button class="chip" data-t="patent">Patent</button>
    </div>

    <label for="urlInput">URL to cite</label>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="https://..." />
    </div>
    <button class="go-btn" id="genBtn" onclick="generate()">Generate citation</button>
    <div class="status" id="status"></div>
    <div class="tip">All three citation formats (general, brief, law review) will be generated at once.</div>
  </div>

  <div id="errorBox" style="display:none;" class="error"></div>
  <div id="resultArea" style="display:none;"></div>

  <footer>Bluebook 21st Edition - API key secured server-side</footer>
</div>

<script>
let selType = 'auto';
let selFormat = 'general';

document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active'); selType = c.dataset.t;
  });
});

document.querySelectorAll('.format-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.format-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active'); selFormat = t.dataset.f;
  });
});

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

async function generate() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url || !url.startsWith('http')) { showError('Please enter a valid URL starting with https://'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating...';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  setStatus('Fetching page and generating citations...');

  try {
    const res = await fetch('/api/cite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, sourceType: selType, citationFormat: selFormat })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Server error ' + res.status);
    setStatus('');
    renderResult(data, selFormat);
  } catch (err) {
    setStatus('');
    showError('Error: ' + (err.message || 'Something went wrong.'));
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Generate citation';
  }
}

function renderResult(d, fmt) {
  const conf = d.confidence || 'medium';
  const confColor = conf === 'high' ? '#3B6D11' : conf === 'low' ? '#993C1D' : '#854F0B';
  const fmtLabels = { general: 'General', brief: 'Court Brief', journal: 'Law Review' };
  const primaryCite = d['citation_' + fmt] || d.citation || '';

  let fields = '';
  if (d.fields) Object.entries(d.fields).forEach(([k, v]) => {
    if (v && String(v).trim() && v !== 'N/A')
      fields += '<div class="field"><span class="field-k">' + esc(k.charAt(0).toUpperCase()+k.slice(1)) + '</span><span class="field-v">' + esc(String(v)) + '</span></div>';
  });

  const allVariants = [
    { key: 'citation_brief', label: 'Court brief' },
    { key: 'citation_journal', label: 'Law review / journal' },
    { key: 'citation_general', label: 'General' }
  ].filter(v => v.key !== 'citation_' + fmt && d[v.key]);

  let variantsHtml = '';
  if (allVariants.length) {
    variantsHtml = '<div class="variants"><div class="variants-title">Other formats (click to copy)</div>';
    allVariants.forEach(v => {
      variantsHtml += '<div class="variant"><div class="variant-label">' + v.label + '</div>';
      variantsHtml += '<div class="variant-text" onclick="copyVariant(this)">' + esc(d[v.key] || '') + '</div></div>';
    });
    variantsHtml += '</div>';
  }

  document.getElementById('resultArea').innerHTML =
    '<div class="result-card">' +
      '<div class="result-header">' +
        '<div style="display:flex;gap:6px;align-items:center;">' +
          '<span class="badge">' + esc(d.type || 'Citation') + '</span>' +
          '<span class="format-badge">' + (fmtLabels[fmt] || 'General') + '</span>' +
        '</div>' +
        '<div class="meta">' +
          '<span style="font-size:11px;color:' + confColor + ';">' + conf + ' confidence</span>' +
          '<span class="rule-tag">' + esc(d.rule || '') + '</span>' +
          '<button class="copy-btn" onclick="copyCite(this)">Copy</button>' +
        '</div>' +
      '</div>' +
      '<div class="citation-text" id="citeOut">' + esc(primaryCite) + '</div>' +
      variantsHtml +
      (d.notes ? '<div class="note-box">Note: ' + esc(d.notes) + '</div>' : '') +
      (fields ? '<div class="breakdown"><div class="breakdown-label">Components</div>' + fields + '</div>' : '') +
    '</div>';

  document.getElementById('resultArea').style.display = 'block';
}

function copyCite(btn) {
  navigator.clipboard.writeText(document.getElementById('citeOut').innerText).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1600);
  });
}

function copyVariant(el) {
  navigator.clipboard.writeText(el.innerText).then(() => {
    const orig = el.style.background;
    el.style.background = '#d4edda';
    setTimeout(() => { el.style.background = orig; }, 1000);
  });
}

function setStatus(m) { document.getElementById('status').textContent = m; }
function showError(m) { const b = document.getElementById('errorBox'); b.textContent = m; b.style.display = 'block'; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
